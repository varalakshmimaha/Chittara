<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Chittara Star Awards</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #5c0e0e 0%, #8b1a1a 50%, #5c0e0e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      padding: 50px 40px;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .login-box h1 {
      font-family: 'Cinzel', serif;
      color: #8b1a1a;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .login-box p {
      color: #888;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0d5c1;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
    }
    .form-group input:focus {
      outline: none;
      border-color: #c9a84c;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #8b1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      letter-spacing: 2px;
      transition: background 0.3s;
    }
    .login-btn:hover { background: #5c0e0e; }
    .error-msg {
      color: #8b1a1a;
      background: #fee;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      display: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Chittara Awards</h1>
    <p>Admin Panel Login</p>
    <div class="error-msg" id="errorMsg"></div>
    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="login-btn">Login</button>
    </form>
  </div>
  <script>
    async function doLogin(e) {
      e.preventDefault();
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/admin';
        } else {
          errEl.textContent = data.error;
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
