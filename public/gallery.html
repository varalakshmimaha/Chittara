<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Playfair+Display:wght@400;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .gallery-page { padding: 0 0 60px; }
    .gallery-grid {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
      padding: 0 20px;
    }
    .gallery-item {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 3px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s;
      cursor: pointer;
    }
    .gallery-item:hover { transform: scale(1.03); }
    .gallery-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }
    .gallery-item .gallery-title {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--maroon-dark);
      background: var(--white);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    .lightbox-close {
      position: absolute;
      top: 20px; right: 30px;
      color: #fff;
      font-size: 36px;
      cursor: pointer;
      background: none;
      border: none;
      z-index: 10001;
    }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      font-size: 40px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 15px 20px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.25); }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    @media (max-width: 600px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 10px; }
      .gallery-item img { height: 150px; }
    }
  </style>
</head>
<body>
  <div id="shared-header"></div>

  <section class="gallery-page section-gold-bg">
    <div class="partners-bar"><h2>Gallery</h2></div>
    <div id="galleryContent">
      <div class="loading"><img src="/uploads/logos/chittara-loader.png" alt="Loading" class="loading-logo"><p>Loading gallery...</p></div>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <button class="lightbox-nav lightbox-prev" onclick="navLightbox(event,-1)">&#8249;</button>
    <img id="lightboxImg" src="" alt="Gallery">
    <button class="lightbox-nav lightbox-next" onclick="navLightbox(event,1)">&#8250;</button>
  </div>

  <div id="shared-footer"></div>

  <script src="/js/shared.js"></script>
  <script>
    var galleryImages = [];
    var lightboxIndex = 0;

    loadSharedLayout(function(siteData) {
      var gallery = siteData.gallery || [];
      var container = document.getElementById('galleryContent');

      if (!gallery.length) {
        container.innerHTML = '<p class="empty-state">No photos available yet. Check back soon!</p>';
        return;
      }

      galleryImages = gallery;
      var html = '<div class="gallery-grid">';
      gallery.forEach(function(g, i) {
        html += '<div class="gallery-item" onclick="openLightbox(' + i + ')">';
        html += '<img src="' + g.image + '" alt="' + (g.title || 'Gallery') + '">';
        if (g.title) html += '<div class="gallery-title">' + g.title + '</div>';
        html += '</div>';
      });
      html += '</div>';
      container.innerHTML = html;
    });

    function openLightbox(index) {
      lightboxIndex = index;
      document.getElementById('lightboxImg').src = galleryImages[index].image;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox(e) {
      if (e && e.target !== e.currentTarget && !e.target.classList.contains('lightbox-close')) return;
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    function navLightbox(e, dir) {
      e.stopPropagation();
      lightboxIndex = (lightboxIndex + dir + galleryImages.length) % galleryImages.length;
      document.getElementById('lightboxImg').src = galleryImages[lightboxIndex].image;
    }
    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navLightbox(e, -1);
      if (e.key === 'ArrowRight') navLightbox(e, 1);
    });
  </script>
</body>
</html>
