<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jury Team</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Playfair+Display:wght@400;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .jury-page { padding: 0 0 60px; }
    .jury-grid {
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px 0;
      padding: 0 40px;
      position: relative;
      z-index: 1;
    }
    .jury-card {
      text-align: center;
      flex: 0 0 25%;
      padding: 0 15px;
      box-sizing: border-box;
    }
    .jury-img-frame {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      margin: 0 auto 16px;
      position: relative;
      background: linear-gradient(145deg, #e8e0d0 0%, #c0b8a8 30%, #d8d0c0 50%, #b0a898 70%, #d0c8b8 100%);
      padding: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15), inset 0 1px 3px rgba(255,255,255,0.4);
    }
    .jury-img-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid var(--gold);
      box-shadow: inset 0 0 0 2px var(--gold-dark), 0 0 0 1px rgba(201,168,76,0.3);
    }
    .jury-img-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .jury-card h4 {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      color: var(--maroon-dark);
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
    }
    .jury-card p {
      font-size: 11px;
      color: var(--maroon);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
      margin-top: 4px;
    }
    @media (max-width: 768px) {
      .jury-card { flex: 0 0 50% !important; max-width: 50% !important; }
      .jury-img-frame { width: 150px; height: 150px; }
    }
    @media (max-width: 480px) {
      .jury-card { flex: 0 0 100% !important; max-width: 100% !important; }
      .jury-grid { padding: 0 20px; }
    }
  </style>
</head>
<body>
  <div id="shared-header"></div>

  <section class="jury-page section-gold-bg">
    <div class="partners-bar"><h2>Jury Team</h2></div>
    <div id="juryContent">
      <div class="loading"><img src="/uploads/logos/chittara-loader.png" alt="Loading" class="loading-logo"><p>Loading jury members...</p></div>
    </div>
  </section>

  <div id="shared-footer"></div>

  <script src="/js/shared.js"></script>
  <script>
    loadSharedLayout(function(siteData) {
      var jury = siteData.jury || [];
      var container = document.getElementById('juryContent');

      if (!jury.length) {
        container.innerHTML = '<p class="empty-state">Jury members will be announced soon!</p>';
        return;
      }

      var total = jury.length;
      var firstRowCount = total <= 4 ? total : Math.ceil(total / 2);
      var firstRow = jury.slice(0, firstRowCount);
      var secondRow = jury.slice(firstRowCount);

      function renderRow(members, count) {
        var html = '<div class="jury-grid" style="margin-bottom:40px;">';
        members.forEach(function(j) {
          var w = (100 / count).toFixed(2);
          html += '<div class="jury-card" style="flex:0 0 ' + w + '%;max-width:' + w + '%;">';
          html += '<div class="jury-img-frame"><div class="jury-img-inner">';
          html += '<img src="' + (j.image || '/uploads/nominees/placeholder.png') + '" alt="' + j.name + '">';
          html += '</div></div>';
          html += '<h4>' + j.name + '</h4>';
          html += '<p>' + (j.designation || '') + '</p>';
          html += '</div>';
        });
        html += '</div>';
        return html;
      }

      var html = renderRow(firstRow, firstRowCount);
      if (secondRow.length) {
        html += renderRow(secondRow, secondRow.length);
      }

      container.innerHTML = html;
    });
  </script>
</body>
</html>
